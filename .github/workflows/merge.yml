name: 规则合并去重

on:
  schedule:
    - cron: '0 6 * * *'      # 每天 UTC 6:00（北京时间 14:00）自动运行
  workflow_dispatch:          # 支持手动触发

jobs:
  merge-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 10       # 防止卡死
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载并合并规则
        run: |
          # 如果 sources.txt 不存在则报错
          if [ ! -f sources.txt ]; then
            echo "❌ sources.txt 不存在！"
            exit 1
          fi
          
          # 清空临时文件
          > raw.txt
          
          # 遍历每个规则源
          while read -r url; do
            # 跳过空行和注释
            [[ -z "$url" || "$url" =~ ^# ]] && continue
            
            echo "📥 下载: $url"
            
            # 下载并提取域名（容错处理）
            curl -sSL --connect-timeout 10 --max-time 30 "$url" 2>/dev/null | \
              grep -oE '([a-zA-Z0-9]([a-zA-Z0-9\-]*[a-zA-Z0-9])?\.)+[a-zA-Z]{2,}' | \
              grep -v '^[0-9]' >> raw.txt || {
                echo "⚠️  警告：$url 下载失败或没有域名"
                continue
              }
            
          done < sources.txt
          
          # 如果 raw.txt 为空，终止任务
          if [ ! -s raw.txt ]; then
            echo "❌ 没有提取到任何域名！"
            exit 1
          fi
          
          # 排序去重，并过滤掉过短的无效域名
          cat raw.txt | \
            awk '{print tolower($0)}' | \
            sort -u | \
            awk 'length($0) > 3' > whitelist.txt
          
          # 统计结果
          echo "✅ 合并完成！共 $(wc -l < whitelist.txt) 条规则"
          echo "📋 前 10 条预览："
          head -n 10 whitelist.txt

      - name: 转换为 Clash 格式（可选）
        run: |
          # 如果你用 Clash，可以生成一份 yaml 格式的规则
          echo "# 自动生成于 $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > whitelist_clash.yaml
          echo "payload:" >> whitelist_clash.yaml
          cat whitelist.txt | sed 's/^/  - "+.&"/' >> whitelist_clash.yaml
          echo "✅ Clash 格式已生成"

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查是否有变更
          if git diff --quiet; then
            echo "ℹ️ 没有新规则，跳过提交"
            exit 0
          fi
          
          git add whitelist.txt whitelist_clash.yaml 2>/dev/null || git add whitelist.txt
          git commit -m "🔄 自动更新规则 $(date -u '+%Y-%m-%d %H:%M')"
          git push
          
          echo "🎉 推送成功！"